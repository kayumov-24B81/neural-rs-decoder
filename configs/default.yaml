

seed: 42
device: auto

code:
  n: 255
  k: 223
  nsym: 32

channel:
  type: gilbert_elliott
  preset: moderate
  custom_params:
    p: null
    r: null
    h: null
    k: null
  erasure:
    symbol_erase_prob: 0.05

model:
  path: weights/model.pth
  input_size: 511
  hidden_size: 512
  dropout: 0.1
  threshold: 0.3

training:
  train_size: 10000
  val_size: 2000
  epochs: 500
  batch_size: 256
  lr: 0.001
  log_every: 50 # for later
  checkpoint_every: 50 # for later
  patience: 30 # null to disable
  loss:
    type: focal
    focal_alpha: 0.2
    focal_gamma: 1.5

decoders:
  classic: true
  oracle: true
  neural: true

benchmark:
  num_samples: 1000
  tag: null

timing:
  num_samples: 500
  warmup: 50

output:
  dir: results/runs/
  verbose: true